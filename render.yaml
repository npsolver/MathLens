services:
  - type: web
    name: mathlens-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGINS
        value: https://mathlens.npsolver.io,http://localhost:3000
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
    healthCheckPath: /health
